<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Task Tracker</h1>

    <!-- Input section -->
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a task..." />
      <button id="addBtn">Add</button>
    </div>

    <!-- Task list -->
    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
